# Dev nginx: проксирует UI (vite dev server c HMR) и API (FastAPI).
#
# ВАЖНО: используем resolver + переменные в proxy_pass вместо upstream-блоков.
# Это заставляет nginx ресолвить app/ui через docker DNS на каждый запрос
# (с TTL valid=10s). Иначе при `docker compose up -d --force-recreate app`
# контейнер получает новый IP, а nginx остаётся с закешированным старым →
# Connection refused → 502.

# Docker embedded DNS server всегда на 127.0.0.11
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    # ─── Health для healthcheck-а самого nginx ──────────────────────
    # ВАЖНО: путь /healthz, а НЕ /health — иначе точный матч перекрывает
    # SPA-страницу /health (при F5 браузер получал бы "ok" вместо UI).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── API: всё под /admin/api и /api/v1 уходит на FastAPI ────────
    location /admin/api/ {
        # Переменная заставляет nginx делать DNS lookup на каждый запрос
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE (этап 3): отключить буферизацию для /events эндпоинтов
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    location /api/v1/ {
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;
        proxy_set_header Host $http_host;
    }

    # ─── UI: всё остальное — на Vite dev server ─────────────────────
    location / {
        set $ui_upstream "ui:5173";
        proxy_pass http://$ui_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Vite HMR через WebSocket
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 3600s;
    }
}
