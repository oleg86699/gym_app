# Prod top-level nginx: проксирует API на FastAPI (app:8080) и всё остальное —
# на UI-контейнер (prod target = nginx со статикой SvelteKit, слушает :80).
#
# Как и в dev — resolver + переменные в proxy_pass, чтобы nginx ресолвил
# app/ui через docker DNS на каждый запрос (контейнер при пересоздании
# получает новый IP; без re-resolve → 502).

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80 default_server;
    server_name _;

    # ─── Health для healthcheck-а самого nginx ──────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── API: всё под /admin/api и /api/v1 — на FastAPI ─────────────
    location /admin/api/ {
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE: отключить буферизацию для /events эндпоинтов
        proxy_buffering off;
        proxy_read_timeout 24h;
    }

    location /api/v1/ {
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /openapi.json {
        set $app_upstream "app:8080";
        proxy_pass http://$app_upstream;
        proxy_set_header Host $http_host;
    }

    # ─── UI: всё остальное — на prod UI-контейнер (nginx + статика) ──
    location / {
        set $ui_upstream "ui:80";
        proxy_pass http://$ui_upstream;

        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }
}
