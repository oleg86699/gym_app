# Активируется когда подключим git (этап 1.5).
# До этого хук-движок не запускается, файл просто хранит конфиг.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: ^(plans/|backend/uv\.lock|ui/package-lock\.json)$

  - repo: local
    hooks:
      - id: compose-lint
        name: docker-compose anti-pattern guard (ADR-014)
        entry: bash deploy/maintenance/compose-lint.sh
        language: system
        files: ^docker-compose.*\.yaml$
        pass_filenames: false
