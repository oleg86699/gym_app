name: Deploy Prod

# Push to `main` builds the app/ui/backup images and deploys them to every
# configured prod server in parallel.
#
# Adding a 2nd prod server:
#   1. Copy the `deploy-prod-a:` job below, rename to `deploy-prod-b:`
#   2. Find-and-replace `PROD_A_` → `PROD_B_` inside that copy
#   3. Add PROD_B_* secrets/vars in GitHub → Settings → Environments → production
#   4. Add the PROD_B block to deploy/preflight-connections.sh
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  # ── compute version + SSH preflight ────────────────────────────────
  preflight:
    runs-on: ubuntu-latest
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_base: ${{ steps.version.outputs.image_base }}
      release_tag: ${{ steps.version.outputs.release_tag }}
    env:
      PROD_A_SSH_HOST: ${{ secrets.PROD_A_SSH_HOST || vars.PROD_A_SSH_HOST }}
      PROD_A_SSH_USER: ${{ secrets.PROD_A_SSH_USER || vars.PROD_A_SSH_USER }}
      PROD_A_SSH_PORT: ${{ secrets.PROD_A_SSH_PORT || vars.PROD_A_SSH_PORT || '22' }}
      PROD_A_SSH_AUTH: ${{ secrets.PROD_A_SSH_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag --list 'v*' --sort=-v:refname | awk '/^v[0-9]+\.[0-9]+\.[0-9]+$/ { print; exit }')"
          [[ -z "${latest_tag}" ]] && latest_tag="v0.0.0"
          if git rev-parse -q --verify "refs/tags/${latest_tag}" >/dev/null; then
            log_range="${latest_tag}..HEAD"
          else
            log_range="HEAD"
          fi
          commit_log="$(git log --format='%s%n%b' ${log_range})"
          base="${latest_tag#v}"; IFS='.' read -r maj min pat <<<"${base}"
          if echo "${commit_log}" | grep -Eiq 'BREAKING CHANGE|^[a-z]+(\([^)]+\))?!: '; then
            maj=$((maj + 1)); min=0; pat=0
          elif echo "${commit_log}" | grep -Eq '^feat(\([^)]+\))?: '; then
            min=$((min + 1)); pat=0
          else
            pat=$((pat + 1))
          fi
          version="${maj}.${min}.${pat}"
          {
            echo "version=${version}"
            echo "image_base=ghcr.io/${GITHUB_REPOSITORY,,}"
            echo "release_tag=v${version}"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved version ${version}"

      - name: Preflight SSH + Docker on prod servers
        env:
          GITHUB_REF_NAME: main
        run: ./deploy/preflight-connections.sh

  # ── build app/ui/backup images → GHCR ──────────────────────────────
  build-and-push:
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: app
            dockerfile: docker/app.Dockerfile
            target: ""
          - name: ui
            dockerfile: docker/ui.Dockerfile
            target: prod
          - name: backup
            dockerfile: docker/backup.Dockerfile
            target: ""
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ needs.preflight.outputs.image_base }}/${{ matrix.name }}:${{ needs.preflight.outputs.version }}
            ${{ needs.preflight.outputs.image_base }}/${{ matrix.name }}:prod-latest
            ${{ needs.preflight.outputs.image_base }}/${{ matrix.name }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── deploy to prod server A ────────────────────────────────────────
  # Copy this whole job for PROD_B etc. (PROD_A_ → PROD_B_); they run parallel.
  deploy-prod-a:
    needs: [preflight, build-and-push]
    runs-on: ubuntu-latest
    environment: production
    env:
      IMAGE_BASE: ${{ needs.preflight.outputs.image_base }}
      VERSION: ${{ needs.preflight.outputs.version }}
      DEPLOY_ROOT: ${{ vars.PROD_A_DEPLOY_ROOT || '/opt/gym_app' }}
      PROD_SSH_HOST: ${{ secrets.PROD_A_SSH_HOST || vars.PROD_A_SSH_HOST }}
      PROD_SSH_USER: ${{ secrets.PROD_A_SSH_USER || vars.PROD_A_SSH_USER }}
      PROD_SSH_PORT: ${{ secrets.PROD_A_SSH_PORT || vars.PROD_A_SSH_PORT || '22' }}
      PROD_SSH_KEY: ${{ secrets.PROD_A_SSH_KEY }}
      APP_ENV_CONTENT: ${{ secrets.PROD_A_APP_ENV }}
      PUBLIC_PORT: ${{ vars.PROD_A_PUBLIC_PORT || '8090' }}
      NGINX_BIND_IP: ${{ vars.PROD_A_NGINX_BIND_IP || '0.0.0.0' }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare SSH key file
        id: ssh_key
        shell: bash
        run: |
          set -euo pipefail
          key_normalized="${PROD_SSH_KEY//$'\r'/}"
          key_normalized="${key_normalized//\\n/$'\n'}"
          key_dir="${GITHUB_WORKSPACE}/.deploy-tmp"; key_file="${key_dir}/prod_a_ssh_key"
          mkdir -p "${key_dir}"; chmod 755 "${key_dir}"
          printf '%s\n' "${key_normalized}" > "${key_file}"; chmod 600 "${key_file}"
          ssh-keygen -y -f "${key_file}" >/dev/null; chmod 644 "${key_file}"
          echo "path=${key_file}" >> "$GITHUB_OUTPUT"

      - name: Render and validate .env
        id: env_file
        shell: bash
        run: |
          set -euo pipefail
          tmp="${GITHUB_WORKSPACE}/.deploy-tmp"; mkdir -p "${tmp}"; env_file="${tmp}/.env"
          if [[ -z "${APP_ENV_CONTENT}" ]]; then echo "::error::PROD_A_APP_ENV secret is empty."; exit 1; fi
          normalized="${APP_ENV_CONTENT//$'\r'/}"; normalized="${normalized//\\n/$'\n'}"
          printf '%s\n' "${normalized}" > "${env_file}"; chmod 644 "${env_file}"
          ./deploy/preflight-env.sh "${env_file}"
          echo "path=${env_file}" >> "$GITHUB_OUTPUT"

      - name: Ensure remote directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.PROD_SSH_HOST }}
          port: ${{ env.PROD_SSH_PORT }}
          username: ${{ env.PROD_SSH_USER }}
          key_path: ${{ steps.ssh_key.outputs.path }}
          envs: DEPLOY_ROOT
          script: |
            set -euo pipefail
            sudo mkdir -p "${DEPLOY_ROOT}/deploy" "${DEPLOY_ROOT}/docker/nginx/conf.d" \
                         "${DEPLOY_ROOT}/data" "${DEPLOY_ROOT}/backups"
            # Делаем DEPLOY_ROOT и конфиг-подкаталоги записываемыми для деплой-юзера,
            # но НЕ трогаем data/ и backups/ — это рантайм-каталоги контейнеров с
            # собственными владельцами (postgres=70, redis=999, minio). Рекурсивный
            # chown на них ронял права файлов БД/redis → "Permission denied" → прод
            # падал на каждом деплое.
            sudo chown "$(whoami)" "${DEPLOY_ROOT}"
            sudo find "${DEPLOY_ROOT}" -mindepth 1 -maxdepth 1 \
                 ! -name data ! -name backups \
                 -exec chown -R "$(whoami)" {} +

      - name: Upload .env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.PROD_SSH_HOST }}
          port: ${{ env.PROD_SSH_PORT }}
          username: ${{ env.PROD_SSH_USER }}
          key_path: ${{ steps.ssh_key.outputs.path }}
          source: ".deploy-tmp/.env"
          target: ${{ env.DEPLOY_ROOT }}
          strip_components: 1
          overwrite: true

      - name: Upload compose + nginx config
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.PROD_SSH_HOST }}
          port: ${{ env.PROD_SSH_PORT }}
          username: ${{ env.PROD_SSH_USER }}
          key_path: ${{ steps.ssh_key.outputs.path }}
          source: "docker-compose.yaml,deploy/docker-compose.deploy.yaml,docker/nginx/nginx.conf,docker/nginx/conf.d/default.prod.conf"
          target: ${{ env.DEPLOY_ROOT }}
          overwrite: true

      - name: Deploy stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.PROD_SSH_HOST }}
          port: ${{ env.PROD_SSH_PORT }}
          username: ${{ env.PROD_SSH_USER }}
          key_path: ${{ steps.ssh_key.outputs.path }}
          command_timeout: 25m
          envs: IMAGE_BASE,VERSION,DEPLOY_ROOT,PUBLIC_PORT,NGINX_BIND_IP
          script: |
            set -euo pipefail
            cd "${DEPLOY_ROOT}"
            export APP_IMAGE_REF="${IMAGE_BASE}/app:${VERSION}"
            export UI_IMAGE_REF="${IMAGE_BASE}/ui:${VERSION}"
            export BACKUP_IMAGE_REF="${IMAGE_BASE}/backup:${VERSION}"
            export PUBLIC_PORT="${PUBLIC_PORT}"
            export NGINX_BIND_IP="${NGINX_BIND_IP}"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            COMPOSE="docker compose --project-name gym_app \
              -f docker-compose.yaml -f deploy/docker-compose.deploy.yaml"

            ${COMPOSE} pull
            ${COMPOSE} up -d --remove-orphans
            ${COMPOSE} ps
            ${COMPOSE} logs --tail=40 app || true
            docker image prune -af || true

      - name: Diagnostics on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.PROD_SSH_HOST }}
          port: ${{ env.PROD_SSH_PORT }}
          username: ${{ env.PROD_SSH_USER }}
          key_path: ${{ steps.ssh_key.outputs.path }}
          envs: DEPLOY_ROOT
          script: |
            set -x
            cd "${DEPLOY_ROOT}" || exit 0
            COMPOSE="docker compose --project-name gym_app -f docker-compose.yaml -f deploy/docker-compose.deploy.yaml"
            ${COMPOSE} ps -a || true
            ${COMPOSE} logs --tail=200 || true

      - name: Cleanup
        if: always()
        run: rm -rf "${GITHUB_WORKSPACE}/.deploy-tmp"

  # ── tag the release ────────────────────────────────────────────────
  tag-release:
    needs: [preflight, deploy-prod-a]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push release tag
        env:
          TAG: ${{ needs.preflight.outputs.release_tag }}
        run: |
          set -euo pipefail
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists, skipping."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
